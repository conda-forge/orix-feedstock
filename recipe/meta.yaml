{% set python_min = "3.10" %}
{% set name = "orix" %}
{% set version = "0.14.2" %}

package:
  name: {{ name }}-meta
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 352d8af9257d35f8c7a599f558d8752e56baf42f3f17a92f0f49431de98252c8

build:
  number: 0

requirements:
  host:
    - python {{ python_min }}

outputs:
  - name: {{ name }}-base
    build:
      script: '{{ PYTHON }} -m pip install . -vv '
      noarch: python
    requirements:
      host:
        - hatchling
        - pip
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - dask-core
        - diffpy.structure >=3.0.2
        - h5py
        - lazy-loader
        - matplotlib-base >=3.6.1
        - numba
        - numpy
        - pooch >=0.13
        # TODO: Remove when https://github.com/pyxem/orix/issues/510 is fixed
        - pycifrw
        - scipy
        - tqdm
        - typing-extensions
      test:
        requires:
          - pip
          - pytest
          - python {{ python_min }}
        imports:
          - orix
          - orix.crystal_map
          - orix.data
          - orix.io
          - orix.measure
          - orix.plot
          - orix.projections
          - orix.quaternion
          - orix.sampling
          - orix.vector
        commands:
          - export MPLBACKEND=agg
          - python -m pytest --pyargs orix -k "not test_get_sample_reduced_fundamental"
          - python -m pip check
  - name: {{ name }}
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - {{ pin_subpackage('orix-base', exact=True) }}
        - matplotlib-scalebar
        - quaternion
      test:
        requires:
          - pip
          - pytest
          - python {{ python_min }}
        imports:
          - orix
          - orix.crystal_map
          - orix.data
          - orix.io
          - orix.measure
          - orix.plot
          - orix.projections
          - orix.quaternion
          - orix.sampling
          - orix.vector
        commands:
          - export MPLBACKEND=agg
          - python -m pytest --pyargs orix -k "not test_get_sample_reduced_fundamental"

about:
  home: https://orix.readthedocs.io
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: |
    Python library for handling of crystal orientation mapping data
  description: |
    orix defines objects and functions for the analysis of orientations
    represented as quaternions or 3D rotation vectors accounting for crystal
    symmetry. Functionality builds primarily on NumPy and Matplotlib.
  dev_url: https://github.com/pyxem/orix
  doc_url: https://orix.readthedocs.io/en/stable

extra:
  recipe-maintainers:
    - argerlt
    - dnjohnstone
    - pc494
    - hakonanes
    - harripj
